<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 914" role="img" aria-labelledby="title desc">
  <title id="title">Premium Ayurveda morning oral care visual</title>
  <desc id="desc">A realistic Ayurveda morning scene with copper water, neem leaves, amla, herbal twigs, and warm courtyard sunlight.</desc>
  <defs>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04150f" stop-opacity=".22"/>
      <stop offset=".48" stop-color="#04150f" stop-opacity="0"/>
      <stop offset="1" stop-color="#04150f" stop-opacity=".18"/>
    </linearGradient>
  </defs>
  <image href="../media/ayurveda-copper-water.png" width="1600" height="914" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="914" fill="url(#vignette)"/>
</svg>
