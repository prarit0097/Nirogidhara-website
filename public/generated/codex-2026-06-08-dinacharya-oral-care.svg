<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Ayurveda morning oral care still life</title>
  <desc id="desc">A warm Ayurvedic morning still life with copper cup, tongue cleaner, neem leaves, a natural toothbrush twig, and sunlight in a courtyard.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123227"/>
      <stop offset=".48" stop-color="#42664a"/>
      <stop offset="1" stop-color="#f1bd68"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#223b34"/>
      <stop offset=".55" stop-color="#50694d"/>
      <stop offset="1" stop-color="#b58a4c"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f321c"/>
      <stop offset=".25" stop-color="#c97733"/>
      <stop offset=".55" stop-color="#f2bc72"/>
      <stop offset=".78" stop-color="#8f431f"/>
      <stop offset="1" stop-color="#3f1d15"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9d57a"/>
      <stop offset=".55" stop-color="#648d42"/>
      <stop offset="1" stop-color="#25482f"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
