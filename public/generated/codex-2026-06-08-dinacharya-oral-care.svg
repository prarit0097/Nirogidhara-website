      <stop offset=".4" stop-color="#f6c867" stop-opacity=".92"/>
      <stop offset="1" stop-color="#f6c867" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07150f" flood-opacity=".42"/>
    </filter>
    <filter id="warmGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="frame">
      <rect width="1200" height="675" rx="0"/>
    </clipPath>
  </defs>

